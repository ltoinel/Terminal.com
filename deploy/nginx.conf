# ---------------------------------------------------------------------------
# nginx server block for ludovic.toinel.com (static Astro build + PHP backend).
#
# DocumentRoot is the built `dist/` directory. The PHP endpoints (msg.php,
# push-subscribe.php) are copied there from `public/` but read their secrets and
# state from ONE LEVEL ABOVE (push.config.php, push-store.json, …), which stays
# outside the web root and is therefore never served.
#
# Adapt `root` and the php-fpm socket to your host, then reload nginx.
# ---------------------------------------------------------------------------

# Redirect plain HTTP to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name ludovic.toinel.com www.ludovic.toinel.com;
    return 301 https://ludovic.toinel.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ludovic.toinel.com;

    # Built site. Astro uses trailingSlash:'always' → /whoami/ => /whoami/index.html.
    root /data/www/ludovic.toinel.com/public_html/dist;
    index index.html;

    # --- Cloudflare: recover the real client IP (this site is behind CF) -----
    # Without this, REMOTE_ADDR (and nginx logs) show Cloudflare's IP. The PHP
    # backend already reads CF-Connecting-IP (push.config.php trusted_ip_header),
    # but setting it here fixes nginx logs/limits too. Refresh the ranges from
    # https://www.cloudflare.com/ips/ — abbreviated here:
    #   set_real_ip_from 173.245.48.0/20;  (… all CF v4 ranges …)
    #   set_real_ip_from 2400:cb00::/32;    (… all CF v6 ranges …)
    #   real_ip_header CF-Connecting-IP;

    # --- TLS (managed by your cert tooling, e.g. certbot) -------------------
    ssl_certificate     /etc/letsencrypt/live/ludovic.toinel.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ludovic.toinel.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # --- Security headers (sent on every response) --------------------------
    # `always` makes them apply to error responses too. Note: an `add_header` in
    # a nested location REPLACES these, so repeat them (or `include` this snippet)
    # in any location that defines its own add_header.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=()" always;

    # --- Content-Security-Policy --------------------------------------------
    # The interactive shell intentionally (a) evaluates authored command JS via
    # AsyncFunction → needs 'unsafe-eval', and (b) lets `ping`/`nslookup`/`checkip`
    # /`weather` fetch arbitrary HTTPS hosts → needs a broad connect-src. So the
    # CSP is a hardening layer, not a strict sandbox. Inline allowances cover
    # Astro's inlined script/JSON blocks and the style attributes the shell injects.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https:; manifest-src 'self'; worker-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # --- Service worker: must update promptly, so do not cache it ------------
    location = /sw.js {
        add_header Cache-Control "no-cache" always;
        # Re-assert security headers (this location overrides the server ones).
        add_header X-Content-Type-Options "nosniff" always;
    }

    # --- PHP endpoints (Web Push) via php-fpm -------------------------------
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;   # adapt to your php-fpm socket
        fastcgi_read_timeout 15s;
    }

    # --- Shell data: stable filenames, so revalidate (cheap 304s). The service
    #     worker serves these instantly from its cache; this keeps non-SW
    #     browsers fresh after a deploy. ---------------------------------------
    location ~* ^/shell-(fs|commands)\.json$ {
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        try_files $uri =404;
    }

    # --- Long-cache fingerprinted/static assets -----------------------------
    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }
    location ~* \.(png|jpg|jpeg|webp|svg|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=2592000" always;
        try_files $uri =404;
    }

    # --- Deny dotfiles (but keep /.well-known/ reachable) -------------------
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # --- Default routing (directory index pages) ----------------------------
    location / {
        try_files $uri $uri/ =404;
    }
}
